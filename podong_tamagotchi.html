<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>포동이 다마고치</title>
<style>
  :root{
    --bg1:#fff8d8;
    --bg2:#ffe0ee;
    --ink:#41384a;
    --mint:#9be8d5;
    --pink:#ff9fbd;
    --yellow:#ffd86b;
    --blue:#9fc8ff;
    --panel:#fffdf7;
    --danger:#ff6b78;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;color:var(--ink);background:
    radial-gradient(circle at 10% 10%,rgba(255,255,255,.85),transparent 23%),
    linear-gradient(145deg,var(--bg1),var(--bg2));}
  body{display:flex;align-items:center;justify-content:center;padding:18px;overflow-x:hidden}
  button{font:inherit}
  #game{width:min(980px,100%);display:grid;grid-template-columns:1.15fr .85fr;gap:18px}
  .card{background:rgba(255,253,247,.88);border:3px solid rgba(65,56,74,.12);border-radius:28px;box-shadow:0 18px 40px rgba(99,70,100,.14),inset 0 2px 0 rgba(255,255,255,.9)}
  #device{padding:18px;position:relative}
  .device-shell{background:linear-gradient(160deg,#fff3a8,#ffbdcf);border:5px solid #574b61;border-radius:42px;padding:18px;box-shadow:inset 0 0 0 6px rgba(255,255,255,.55),0 15px 0 #d795aa;position:relative}
  .device-shell:before,.device-shell:after{content:"";position:absolute;width:18px;height:18px;background:#fff;border:4px solid #574b61;border-radius:50%;top:24px}
  .device-shell:before{left:24px}.device-shell:after{right:24px}
  .brand{text-align:center;font-weight:900;letter-spacing:.08em;margin:4px 0 10px;font-size:20px}
  #screen{height:500px;border:5px solid #574b61;border-radius:24px;overflow:hidden;position:relative;background:#bcecff;box-shadow:inset 0 0 0 4px rgba(255,255,255,.38)}
  #sky{position:absolute;inset:0;background:linear-gradient(#aee4ff 0 67%,#d5f4a8 67%);transition:.5s}
  #sun{position:absolute;width:62px;height:62px;background:#fff39b;border-radius:50%;right:38px;top:36px;box-shadow:0 0 32px #fff39b}
  .cloud{position:absolute;width:76px;height:28px;background:#fff;border-radius:40px;opacity:.8}
  .cloud:before,.cloud:after{content:"";position:absolute;background:#fff;border-radius:50%}
  .cloud:before{width:34px;height:34px;left:12px;top:-15px}.cloud:after{width:44px;height:44px;right:8px;top:-22px}
  .c1{left:28px;top:62px}.c2{right:90px;top:125px;transform:scale(.75)}
  #room{position:absolute;left:0;right:0;bottom:0;height:33%;background:linear-gradient(#c9ef98,#a6db75);border-top:4px solid rgba(65,56,74,.14)}
  #room:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 30px,rgba(255,255,255,.14) 30px 34px)}
  #petWrap{position:absolute;left:50%;bottom:115px;transform:translateX(-50%);width:220px;height:220px;display:flex;align-items:flex-end;justify-content:center}
  #pet{position:relative;width:150px;height:136px;background:#ffe49a;border:5px solid #574b61;border-radius:48% 48% 43% 43%;transform-origin:50% 100%;animation:breathe 2.2s ease-in-out infinite}
  #pet.baby{width:112px;height:104px}
  #pet.adult{width:168px;height:150px}
  #pet:before,#pet:after{content:"";position:absolute;width:44px;height:52px;background:inherit;border:5px solid #574b61;border-bottom:none;top:-27px;z-index:-1}
  #pet:before{left:10px;border-radius:70% 20% 0 0;transform:rotate(-18deg)}
  #pet:after{right:10px;border-radius:20% 70% 0 0;transform:rotate(18deg)}
  .eye{position:absolute;width:14px;height:20px;background:#574b61;border-radius:50%;top:48px}
  .eye.left{left:38px}.eye.right{right:38px}
  .eye:after{content:"";position:absolute;width:5px;height:5px;background:#fff;border-radius:50%;left:3px;top:3px}
  .mouth{position:absolute;width:22px;height:13px;border-bottom:5px solid #574b61;border-radius:0 0 20px 20px;left:50%;top:77px;transform:translateX(-50%)}
  .blush{position:absolute;width:23px;height:11px;background:#ff9fbd;border-radius:50%;top:72px;opacity:.65}
  .blush.left{left:13px}.blush.right{right:13px}
  #pet.sad .mouth{border-bottom:0;border-top:5px solid #574b61;border-radius:20px 20px 0 0;top:86px}
  #pet.sleeping .eye{height:5px;border-radius:10px;top:58px}
  #pet.sleeping .mouth{width:12px;height:12px;border:4px solid #574b61;border-radius:50%;top:80px}
  #shadow{position:absolute;width:150px;height:30px;background:rgba(70,60,70,.18);border-radius:50%;bottom:-8px;filter:blur(2px)}
  #bubble{position:absolute;left:50%;top:18px;transform:translateX(-50%);min-width:180px;max-width:78%;background:#fff;border:4px solid #574b61;border-radius:20px;padding:10px 14px;text-align:center;font-weight:800;opacity:0;transition:.25s;z-index:4}
  #bubble.show{opacity:1;transform:translateX(-50%) translateY(4px)}
  #bubble:after{content:"";position:absolute;left:50%;bottom:-13px;width:18px;height:18px;background:#fff;border-right:4px solid #574b61;border-bottom:4px solid #574b61;transform:translateX(-50%) rotate(45deg)}
  #poopArea{position:absolute;left:0;right:0;bottom:75px;height:90px;pointer-events:none}
  .poop{position:absolute;font-size:42px;filter:drop-shadow(0 5px 0 rgba(0,0,0,.1));animation:wobble 1.7s infinite}
  .heart,.spark{position:absolute;font-size:28px;pointer-events:none;animation:floatUp 1.3s ease-out forwards}
  #topHud{position:absolute;left:12px;right:12px;top:12px;display:flex;justify-content:space-between;z-index:5;font-weight:900;font-size:13px}
  .badge{background:rgba(255,255,255,.82);border:3px solid #574b61;border-radius:999px;padding:6px 10px}
  .device-buttons{display:flex;justify-content:center;gap:22px;margin-top:18px}
  .roundBtn{width:68px;height:68px;border-radius:50%;border:5px solid #574b61;background:#fff6f9;box-shadow:0 7px 0 #c98fa4;font-weight:900;color:#574b61;cursor:pointer}
  .roundBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #c98fa4}
  #side{padding:18px;display:flex;flex-direction:column;gap:14px}
  .titleRow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{margin:0;font-size:28px}.sub{font-size:13px;color:#74697b}
  .coin{background:#fff6be;border:3px solid #574b61;border-radius:999px;padding:7px 12px;font-weight:900;white-space:nowrap}
  #stats{display:grid;gap:10px}
  .stat{display:grid;grid-template-columns:82px 1fr 42px;align-items:center;gap:8px;font-size:13px;font-weight:800}
  .bar{height:17px;border:3px solid #574b61;border-radius:999px;background:#fff;overflow:hidden}
  .fill{height:100%;width:50%;transition:.35s}
  .hunger{background:linear-gradient(90deg,#ffbc6e,#ffe17a)}
  .happy{background:linear-gradient(90deg,#ff8fb4,#ffb6d2)}
  .clean{background:linear-gradient(90deg,#74dce7,#b5f5ee)}
  .energy{background:linear-gradient(90deg,#a98cff,#c7b7ff)}
  #actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .action{border:3px solid #574b61;border-radius:18px;background:#fff;padding:14px 10px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(87,75,97,.22)}
  .action:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(87,75,97,.22)}
  .action span{display:block;font-size:25px;margin-bottom:3px}
  .action:disabled{opacity:.45;cursor:not-allowed}
  #log{height:145px;overflow:auto;background:#fff;border:3px solid #574b61;border-radius:18px;padding:10px 12px;font-size:12px;line-height:1.55}
  .logItem{padding:5px 0;border-bottom:1px dashed #ddd}.logItem:last-child{border-bottom:0}
  #miniGame{display:none;background:#fff;border:3px solid #574b61;border-radius:18px;padding:12px}
  #miniGame.show{display:block}
  #catchField{height:130px;border-radius:14px;background:linear-gradient(#cbeaff,#e7ffd0);position:relative;overflow:hidden;border:2px dashed #8f8595}
  #starTarget{position:absolute;font-size:38px;cursor:pointer;user-select:none;transition:.08s}
  #miniInfo{display:flex;justify-content:space-between;font-weight:900;font-size:13px;margin-top:8px}
  #footer{font-size:11px;color:#7a6f81;text-align:center}
  #modal{position:fixed;inset:0;background:rgba(38,30,45,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}
  #modal.show{display:flex}
  .modalCard{width:min(420px,100%);background:#fffdf7;border:5px solid #574b61;border-radius:26px;padding:22px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.22)}
  .modalCard h2{margin:0 0 8px}.modalCard p{line-height:1.6}
  .modalCard input{width:100%;padding:12px;border:3px solid #574b61;border-radius:14px;font-size:16px;text-align:center;margin:10px 0}
  .modalActions{display:flex;gap:10px;justify-content:center;margin-top:12px}
  .modalActions button{border:3px solid #574b61;border-radius:14px;padding:10px 16px;background:#fff4a8;font-weight:900;cursor:pointer}
  @keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.96)}}
  @keyframes bounce{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-38px) rotate(-5deg)}60%{transform:translateY(-12px) rotate(5deg)}}
  @keyframes wobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translateY(-100px) scale(1.25)}}
  @media(max-width:820px){
    body{align-items:flex-start}
    #game{grid-template-columns:1fr;max-width:560px}
    #screen{height:455px}
  }
  @media(max-width:430px){
    body{padding:8px}
    #device,#side{padding:10px}
    .device-shell{padding:12px;border-radius:32px}
    #screen{height:420px}
    .device-buttons{gap:15px}
    .roundBtn{width:60px;height:60px}
    h1{font-size:24px}
  }
</style>
</head>
<body>
<div id="game">
  <section id="device" class="card">
    <div class="device-shell">
      <div class="brand">PO-DONG PET</div>
      <div id="screen">
        <div id="sky"></div>
        <div id="sun"></div>
        <div class="cloud c1"></div><div class="cloud c2"></div>
        <div id="room"></div>
        <div id="topHud">
          <div class="badge" id="clockBadge">☀️ 낮</div>
          <div class="badge" id="ageBadge">0일 · 아기</div>
        </div>
        <div id="bubble">안녕!</div>
        <div id="petWrap">
          <div id="shadow"></div>
          <div id="pet" class="baby">
            <div class="eye left"></div><div class="eye right"></div>
            <div class="blush left"></div><div class="blush right"></div>
            <div class="mouth"></div>
          </div>
        </div>
        <div id="poopArea"></div>
      </div>
      <div class="device-buttons">
        <button class="roundBtn" id="soundBtn">🔊<br><small>소리</small></button>
        <button class="roundBtn" id="saveBtn">💾<br><small>저장</small></button>
        <button class="roundBtn" id="resetBtn">↻<br><small>초기화</small></button>
      </div>
    </div>
  </section>

  <aside id="side" class="card">
    <div class="titleRow">
      <div><h1 id="petNameTitle">포동이</h1><div class="sub">작고 귀여운 친구를 잘 돌봐주세요.</div></div>
      <div class="coin">🪙 <span id="coins">20</span></div>
    </div>

    <div id="stats">
      <div class="stat"><span>🍙 배고픔</span><div class="bar"><div class="fill hunger" id="hungerFill"></div></div><b id="hungerText">80</b></div>
      <div class="stat"><span>💗 행복</span><div class="bar"><div class="fill happy" id="happyFill"></div></div><b id="happyText">80</b></div>
      <div class="stat"><span>🫧 청결</span><div class="bar"><div class="fill clean" id="cleanFill"></div></div><b id="cleanText">80</b></div>
      <div class="stat"><span>⚡ 기력</span><div class="bar"><div class="fill energy" id="energyFill"></div></div><b id="energyText">80</b></div>
    </div>

    <div id="actions">
      <button class="action" data-action="feed"><span>🍙</span>먹이주기</button>
      <button class="action" data-action="play"><span>🪀</span>놀아주기</button>
      <button class="action" data-action="clean"><span>🫧</span>청소하기</button>
      <button class="action" data-action="sleep"><span>🌙</span>재우기</button>
    </div>

    <div id="miniGame">
      <b>⭐ 별잡기 미니게임</b>
      <div class="sub">10초 동안 별을 많이 잡아 코인을 모으세요.</div>
      <div id="catchField"><div id="starTarget">⭐</div></div>
      <div id="miniInfo"><span>점수 <b id="miniScore">0</b></span><span>남은 시간 <b id="miniTime">10</b>초</span></div>
    </div>

    <div id="log"></div>
    <div id="footer">자동 저장됨 · 브라우저를 닫아도 이어서 키울 수 있어요.</div>
  </aside>
</div>

<div id="modal">
  <div class="modalCard">
    <h2 id="modalTitle">새 친구가 태어났어요!</h2>
    <p id="modalText">이름을 지어주세요.</p>
    <input id="nameInput" maxlength="8" placeholder="포동이">
    <div class="modalActions">
      <button id="modalOk">시작하기</button>
      <button id="modalCancel" style="display:none;background:#fff">취소</button>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = s => document.querySelector(s);
  const $$ = s => [...document.querySelectorAll(s)];
  const clamp=(v,min=0,max=100)=>Math.max(min,Math.min(max,v));
  const SAVE_KEY='podong_tamagotchi_v1';

  const defaultState=()=>({
    name:'포동이', hunger:82, happy:78, clean:86, energy:88,
    coins:20, ageSeconds:0, bornAt:Date.now(), lastUpdate:Date.now(),
    poops:0, sleeping:false, sound:true, stage:'baby', alive:true,
    logs:['새로운 친구가 태어났어요!'], lastPoop:Date.now(), lastEvent:Date.now()
  });

  let state=defaultState();
  let miniTimer=null, miniCountdown=null, miniScore=0;
  let audioCtx=null;

  function tone(freq=440,dur=.08,type='sine',vol=.035){
    if(!state.sound) return;
    try{
      audioCtx ||= new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type;o.frequency.value=freq;g.gain.value=vol;
      g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }

  function save(){
    state.lastUpdate=Date.now();
    localStorage.setItem(SAVE_KEY,JSON.stringify(state));
  }

  function load(){
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    try{
      state={...defaultState(),...JSON.parse(raw)};
      const elapsed=Math.min((Date.now()-state.lastUpdate)/1000,60*60*8);
      applyDecay(elapsed,true);
      return true;
    }catch(e){return false}
  }

  function log(msg){
    const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    state.logs.unshift(`${time} · ${msg}`);
    state.logs=state.logs.slice(0,18);
    renderLog();
  }

  function renderLog(){
    $('#log').innerHTML=state.logs.map(x=>`<div class="logItem">${x}</div>`).join('');
  }

  function speak(text){
    const b=$('#bubble');
    b.textContent=text;b.classList.add('show');
    clearTimeout(speak.t);
    speak.t=setTimeout(()=>b.classList.remove('show'),1800);
  }

  function particles(emoji,count=7){
    const screen=$('#screen');
    for(let i=0;i<count;i++){
      const e=document.createElement('div');
      e.className=emoji==='💗'?'heart':'spark';
      e.textContent=emoji;
      e.style.left=(38+Math.random()*26)+'%';
      e.style.top=(45+Math.random()*18)+'%';
      e.style.animationDelay=(Math.random()*.25)+'s';
      screen.appendChild(e);
      setTimeout(()=>e.remove(),1700);
    }
  }

  function applyDecay(sec,offline=false){
    if(!state.alive) return;
    const rate=sec/10;
    if(!state.sleeping){
      state.hunger-=rate*.42;
      state.happy-=rate*.24;
      state.clean-=rate*.16;
      state.energy-=rate*.19;
    }else{
      state.hunger-=rate*.22;
      state.clean-=rate*.08;
      state.energy+=rate*1.05;
      state.happy+=rate*.12;
    }
    if(state.poops>0) state.clean-=rate*.32*state.poops;
    state.ageSeconds+=sec;
    ['hunger','happy','clean','energy'].forEach(k=>state[k]=clamp(state[k]));
    updateStage();
    if(Math.min(state.hunger,state.happy,state.clean,state.energy)<=0){
      state.alive=false;
      state.sleeping=false;
      if(!offline) openRevive();
    }
  }

  function updateStage(){
    const old=state.stage;
    const days=state.ageSeconds/120; // 게임 속 하루: 2분
    state.stage=days>=3?'adult':days>=1?'child':'baby';
    if(old!==state.stage){
      log(`${state.name}이(가) ${stageName()} 단계로 성장했어요!`);
      speak('나 성장했어!');
      particles('✨',12);tone(880,.2,'triangle',.05);
    }
  }

  function stageName(){
    return state.stage==='adult'?'어른':state.stage==='child'?'어린이':'아기';
  }

  function mood(){
    if(!state.alive) return 'sad';
    if(state.sleeping) return 'sleeping';
    const min=Math.min(state.hunger,state.happy,state.clean,state.energy);
    return min<25?'sad':'normal';
  }

  function render(){
    $('#petNameTitle').textContent=state.name;
    $('#coins').textContent=Math.floor(state.coins);
    const vals={hunger:state.hunger,happy:state.happy,clean:state.clean,energy:state.energy};
    Object.entries(vals).forEach(([k,v])=>{
      $('#'+k+'Fill').style.width=clamp(v)+'%';
      $('#'+k+'Text').textContent=Math.round(v);
    });
    const days=Math.floor(state.ageSeconds/120);
    $('#ageBadge').textContent=`${days}일 · ${stageName()}`;

    const pet=$('#pet');
    pet.className=state.stage;
    const m=mood(); if(m!=='normal') pet.classList.add(m);

    $('#poopArea').innerHTML='';
    for(let i=0;i<Math.min(state.poops,5);i++){
      const p=document.createElement('div');p.className='poop';p.textContent='💩';
      p.style.left=(12+i*18+(i%2)*4)+'%';p.style.bottom=(i%2)*8+'px';
      $('#poopArea').appendChild(p);
    }

    const hour=new Date().getHours(),night=hour<7||hour>=19;
    $('#clockBadge').textContent=night?'🌙 밤':'☀️ 낮';
    $('#sky').style.background=night?'linear-gradient(#23335f 0 67%,#6f8f69 67%)':'linear-gradient(#aee4ff 0 67%,#d5f4a8 67%)';
    $('#sun').style.background=night?'#fff4c1':'#fff39b';
    $('#sun').style.boxShadow=night?'0 0 28px #d9e3ff':'0 0 32px #fff39b';
    $('#sun').style.transform=night?'scale(.72)':'scale(1)';

    $$('.action').forEach(b=>b.disabled=!state.alive);
    renderLog();
  }

  function action(type){
    if(!state.alive) return;
    if(type==='feed'){
      if(state.coins<2){speak('코인이 부족해!');tone(120,.15,'sawtooth');return}
      state.coins-=2;state.hunger=clamp(state.hunger+24);state.energy=clamp(state.energy+3);
      log(`${state.name}에게 맛있는 주먹밥을 줬어요.`);speak('냠냠! 맛있어!');particles('💗',5);tone(620,.1);
      bounce();
    }
    if(type==='play'){
      if(state.energy<12){speak('조금 피곤해...');return}
      state.energy=clamp(state.energy-10);state.happy=clamp(state.happy+12);
      log(`${state.name}과(와) 놀기 시작했어요.`);speak('별을 잡아보자!');startMiniGame();tone(760,.12,'triangle');
      bounce();
    }
    if(type==='clean'){
      if(state.poops===0 && state.clean>92){speak('이미 깨끗해!');return}
      state.clean=100;state.poops=0;state.happy=clamp(state.happy+3);
      log('방을 반짝반짝 청소했어요.');speak('상쾌해!');particles('🫧',10);tone(900,.14,'sine');
    }
    if(type==='sleep'){
      state.sleeping=!state.sleeping;
      log(state.sleeping?`${state.name}이(가) 잠들었어요.`:`${state.name}이(가) 일어났어요.`);
      speak(state.sleeping?'잘 자... Zzz':'좋은 아침!');
      tone(state.sleeping?280:700,.16,'sine');
    }
    save();render();
  }

  function bounce(){
    const p=$('#pet');p.style.animation='bounce .75s ease';
    setTimeout(()=>p.style.animation='',760);
  }

  function maybePoop(){
    if(Date.now()-state.lastPoop>45000 && Math.random()<.22 && state.poops<5){
      state.poops++;state.lastPoop=Date.now();
      log(`${state.name}이(가) 응가를 했어요. 청소가 필요해요!`);
      speak('치워줘...');tone(150,.12,'square');
    }
  }

  function randomEvent(){
    if(Date.now()-state.lastEvent<30000 || Math.random()>.18) return;
    state.lastEvent=Date.now();
    const events=[
      ()=>{state.coins+=3;log(`${state.name}이(가) 반짝이는 코인 3개를 찾았어요!`);speak('보물 발견!');particles('✨',7)},
      ()=>{state.happy=clamp(state.happy+8);log('창밖의 무지개를 보고 기분이 좋아졌어요.');speak('무지개다!')},
      ()=>{state.energy=clamp(state.energy+9);log('잠깐 낮잠을 자서 기력이 회복됐어요.');speak('개운해!')},
      ()=>{state.hunger=clamp(state.hunger-6);log('간식 냄새를 맡고 배가 더 고파졌어요.');speak('배고파~')}
    ];
    events[Math.floor(Math.random()*events.length)]();
    tone(820,.12,'triangle');save();
  }

  function startMiniGame(){
    if(miniTimer) return;
    $('#miniGame').classList.add('show');
    miniScore=0;let time=10;
    $('#miniScore').textContent=0;$('#miniTime').textContent=time;
    moveStar();
    miniCountdown=setInterval(()=>{
      time--;$('#miniTime').textContent=time;
      if(time<=0) endMiniGame();
    },1000);
    miniTimer=true;
  }

  function moveStar(){
    const field=$('#catchField'),star=$('#starTarget');
    const maxX=Math.max(0,field.clientWidth-45),maxY=Math.max(0,field.clientHeight-45);
    star.style.left=Math.random()*maxX+'px';star.style.top=Math.random()*maxY+'px';
  }

  function endMiniGame(){
    clearInterval(miniCountdown);miniCountdown=null;miniTimer=null;
    const reward=Math.max(1,Math.floor(miniScore/2));
    state.coins+=reward;state.happy=clamp(state.happy+miniScore*1.5);
    log(`별 ${miniScore}개를 잡아 코인 ${reward}개를 얻었어요!`);
    speak(`${miniScore}개 잡았어!`);
    setTimeout(()=>$('#miniGame').classList.remove('show'),1200);
    save();render();
  }

  $('#starTarget').addEventListener('click',()=>{
    if(!miniTimer)return;
    miniScore++;$('#miniScore').textContent=miniScore;moveStar();tone(800+miniScore*20,.05,'square',.025);
  });

  function openNameModal(){
    $('#modalTitle').textContent='새 친구가 태어났어요!';
    $('#modalText').textContent='이름을 지어주세요.';
    $('#nameInput').value='포동이';
    $('#nameInput').style.display='block';
    $('#modalCancel').style.display='none';
    $('#modalOk').textContent='시작하기';
    $('#modal').classList.add('show');
    $('#modalOk').onclick=()=>{
      state.name=$('#nameInput').value.trim()||'포동이';
      log(`${state.name}의 돌보기가 시작됐어요!`);
      $('#modal').classList.remove('show');save();render();speak(`나는 ${state.name}!`);
    };
  }

  function openReset(){
    $('#modalTitle').textContent='처음부터 다시 키울까요?';
    $('#modalText').textContent='현재 기록은 모두 사라집니다.';
    $('#nameInput').style.display='none';
    $('#modalCancel').style.display='inline-block';
    $('#modalOk').textContent='초기화';
    $('#modal').classList.add('show');
    $('#modalOk').onclick=()=>{
      localStorage.removeItem(SAVE_KEY);state=defaultState();
      $('#modal').classList.remove('show');openNameModal();render();
    };
    $('#modalCancel').onclick=()=>$('#modal').classList.remove('show');
  }

  function openRevive(){
    $('#modalTitle').textContent=`${state.name}이(가) 많이 지쳤어요`;
    $('#modalText').textContent='다시 건강하게 돌봐줄까요? 능력치가 일부 회복됩니다.';
    $('#nameInput').style.display='none';
    $('#modalCancel').style.display='none';
    $('#modalOk').textContent='다시 돌보기';
    $('#modal').classList.add('show');
    $('#modalOk').onclick=()=>{
      state.alive=true;state.hunger=45;state.happy=45;state.clean=45;state.energy=45;state.poops=0;
      log(`${state.name}이(가) 다시 기운을 차렸어요.`);
      $('#modal').classList.remove('show');save();render();speak('다시 잘 부탁해!');
    };
  }

  $$('.action').forEach(b=>b.addEventListener('click',()=>action(b.dataset.action)));
  $('#soundBtn').addEventListener('click',()=>{
    state.sound=!state.sound;$('#soundBtn').innerHTML=(state.sound?'🔊':'🔇')+'<br><small>소리</small>';save();tone(640,.08);
  });
  $('#saveBtn').addEventListener('click',()=>{save();speak('저장했어!');particles('✨',5);tone(720,.12)});
  $('#resetBtn').addEventListener('click',openReset);

  setInterval(()=>{
    applyDecay(1);
    maybePoop();randomEvent();
    render();save();
    if(!state.alive) openRevive();
  },1000);

  const existed=load();
  render();
  $('#soundBtn').innerHTML=(state.sound?'🔊':'🔇')+'<br><small>소리</small>';
  if(!existed) openNameModal();
  else {
    log(`${state.name}이(가) 다시 만나서 반가워해요.`);
    setTimeout(()=>speak('다시 와서 반가워!'),500);
    if(!state.alive) openRevive();
  }
})();
</script>
</body>
</html>
